name: Manual Workflow

on:
  workflow_dispatch:
    inputs:
      name:
        description: "Name"
        type: string
        default: "shareen"
      age:
        description: "Age"
        type: number
        required: true
      

jobs:
  demo:
    runs-on: ubuntu-latest
    steps:
      - name: Greetings
        run: echo "${{ inputs.name }}"

      - name: Age
        run: echo "${{ inputs.age }}"

